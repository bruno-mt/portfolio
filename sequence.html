<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Sequence Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: var(--gray-100); }
  </style>
</head>
<body class="viewer-body">

  <div class="viewer-header">
    <!-- On desktop: always "Back to portfolio". On mobile: toggles to "Back to inbox" when reading. -->
    <a id="header-back" href="index.html" class="viewer-back">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8.5 2.5L4 7L8.5 11.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="header-back-label">Back to portfolio</span>
    </a>
    <span class="viewer-title" id="viewer-title"></span>
  </div>

  <div class="viewer-layout" id="viewer-layout">
    <aside class="inbox-sidebar" id="inbox-sidebar">
      <div class="inbox-header">Inbox</div>
    </aside>
    <main class="reading-pane" id="reading-pane"></main>
  </div>

  <script src="emails.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const seqId  = params.get('seq') || (sequences[0] && sequences[0].id);
    const seq    = sequences.find(s => s.id === seqId) || sequences[0];

    if (!seq) {
      document.body.innerHTML = '<p style="padding:40px;color:#64748b;">Sequence not found.</p>';
      throw new Error('No sequence data');
    }

    document.title = seq.title + ' — Email Viewer';
    document.getElementById('viewer-title').textContent = seq.title;

    // ── Read / unread tracking ──────────────────────────────────────────
    const opened = new Set(); // tracks which indexes have been opened

    // ── Mobile state ────────────────────────────────────────────────────
    // "inbox" = showing sidebar full-screen; "reading" = showing pane full-screen
    let mobileState = 'inbox';
    const isMobile = () => window.innerWidth <= 768;

    const layout      = document.getElementById('viewer-layout');
    const sidebar     = document.getElementById('inbox-sidebar');
    const pane        = document.getElementById('reading-pane');
    const backLink    = document.getElementById('header-back');
    const backLabel   = document.getElementById('header-back-label');

    function setMobileState(state) {
      mobileState = state;
      if (!isMobile()) return;
      if (state === 'inbox') {
        layout.classList.remove('mobile-reading');
        backLink.href = 'index.html';
        backLabel.textContent = 'Back to portfolio';
      } else {
        layout.classList.add('mobile-reading');
        backLink.href = '#';
        backLabel.textContent = 'Back to inbox';
        backLink.onclick = (e) => { e.preventDefault(); setMobileState('inbox'); };
      }
    }

    // On desktop the back link always goes to portfolio
    backLink.addEventListener('click', (e) => {
      if (isMobile() && mobileState === 'reading') {
        e.preventDefault();
        setMobileState('inbox');
      }
    });

    // ── Build inbox items ───────────────────────────────────────────────
    function buildInboxItem(index) {
      const isOverview = index === -1;
      const item = document.createElement('div');
      item.className = 'inbox-item' + (isOverview ? ' overview-item' : '') + ' unread';
      item.dataset.index = index;

      if (isOverview) {
        item.innerHTML = `
          <div class="inbox-sender"><span>${seq.sender.name}</span></div>
          <div class="inbox-subject">Sequence Overview</div>
          <div class="inbox-preview">Brief, structure &amp; approach</div>
        `;
      } else {
        const email = seq.emails[index];
        item.innerHTML = `
          <div class="inbox-sender">
            <span>${seq.sender.name}</span>
            <span class="inbox-date">${email.date}</span>
          </div>
          <div class="inbox-subject">${email.subject}</div>
          <div class="inbox-preview">${email.preview}</div>
        `;
      }

      item.addEventListener('click', () => selectItem(index));
      return item;
    }

    sidebar.appendChild(buildInboxItem(-1));
    seq.emails.forEach((_, i) => sidebar.appendChild(buildInboxItem(i)));

    // ── Select & render ─────────────────────────────────────────────────
    function selectItem(index) {
      // Mark as read
      opened.add(index);
      document.querySelectorAll('.inbox-item').forEach(el => {
        const i = parseInt(el.dataset.index);
        el.classList.toggle('active', i === index);
        el.classList.toggle('unread', !opened.has(i));
      });

      if (index === -1) renderOverview();
      else renderEmail(seq.emails[index]);

      pane.scrollTop = 0;

      if (isMobile()) setMobileState('reading');
    }

    function renderOverview() {
      pane.innerHTML = `
        <div class="email-card overview-card">
          <div class="email-header">
            <div class="email-subject" style="font-size:17px;color:#64748b;font-weight:500;margin-bottom:0;">Overview</div>
          </div>
          <div class="email-body">${seq.overview.body.replace(
            'Start with Email 1 →',
            '<a href="#" onclick="event.preventDefault();selectItem(0);return false;" style="color:#3b82f6;">Start with Email 1 →</a>'
          )}</div>
        </div>
      `;
    }

    function renderEmail(email) {
      const notesHtml = email.notes ? `
        <div class="notes-section">
          <button class="notes-toggle" aria-expanded="false" onclick="toggleNotes(this)">
            <span class="notes-toggle-icon">▶</span>
            Copywriter's Notes
          </button>
          <div class="notes-body">
            <div class="notes-label">✏ Copywriter's Notes</div>
            ${email.notes}
          </div>
        </div>
      ` : '';

      pane.innerHTML = `
        <div class="email-card">
          <div class="email-header">
            <div class="email-meta">
              <div class="avatar">${seq.sender.avatar}</div>
              <div class="email-meta-text">
                <div class="email-from">
                  ${seq.sender.name}
                  <span class="email-from-address">&lt;${seq.sender.email}&gt;</span>
                </div>
                <div class="email-meta-date">${email.date}</div>
              </div>
            </div>
            <div class="email-subject">${email.subject}</div>
            ${email.day ? `<div class="email-day-label">${email.day}</div>` : ''}
          </div>
          <div class="email-body">${email.body}</div>
        </div>
        ${notesHtml}
      `;
    }

    function toggleNotes(btn) {
      const expanded = btn.getAttribute('aria-expanded') === 'true';
      btn.setAttribute('aria-expanded', String(!expanded));
      btn.nextElementSibling.classList.toggle('open', !expanded);
    }
    window.toggleNotes = toggleNotes;
    window.selectItem  = selectItem;

    // ── Initial state ───────────────────────────────────────────────────
    // Desktop: open overview. Mobile: show inbox only.
    if (isMobile()) {
      setMobileState('inbox');
    } else {
      selectItem(-1);
    }
  </script>
</body>
</html>
